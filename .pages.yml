media:
  input: assets
  output: assets

content:
  - name: Tracks
    label: Your Music Library
    type: file
    path: tracks.json
    format: json
    list: true
    fields:
      - name: title
        type: string
        label: Song Title
        required: true
      - name: ep
        type: string
        label: EP / Album Name
        required: false
      - name: releaseDate
        type: string
        label: Release Date (YYYY-MM-DD)
        required: true
      - name: mp3
        type: file
        label: MP3 File
        required: true
      - name: wav
        type: file
        label: WAV File
        required: true
      - name: cover
        type: file
        label: Cover Art / Icon