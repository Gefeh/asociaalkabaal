<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie Music Vault</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #1DB954; /* Spotify Green for irony */
            --indie-red: #ff3366;
            --card-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            transition: opacity 0.6s ease-in-out; /* Smooth transition speed */
            opacity: 1;
        }

            .screen.fade-out {
                opacity: 0;
                pointer-events: none; /* Prevents clicks while fading out */
            }

        .hidden {
            display: none !important;
        }

        /* --- LANDING GAME STYLES --- */
        #game-screen {
            text-align: center;
        }

            #game-screen h1 {
                font-size: 2.5rem;
                margin-bottom: 10px;
                color: var(--indie-red);
                text-transform: uppercase;
                letter-spacing: 2px;
            }

            #game-screen p {
                margin-bottom: 20px;
                color: #aaa;
            }

        #canvas-container {
            position: relative;
            border: 3px solid var(--indie-red);
            border-radius: 8px;
            background: #111;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
            overflow: hidden;
        }

        /* --- SCREEN SHAKE EFFECT --- */
        @keyframes shake {
            0% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            10% {
                transform: translate(-2px, -3px) rotate(-1deg);
            }

            20% {
                transform: translate(-4px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(0px, 3px) rotate(0deg);
            }

            40% {
                transform: translate(2px, -2px) rotate(1deg);
            }

            50% {
                transform: translate(-2px, 3px) rotate(-1deg);
            }

            60% {
                transform: translate(-4px, 2px) rotate(0deg);
            }

            70% {
                transform: translate(3px, 2px) rotate(-1deg);
            }

            80% {
                transform: translate(-2px, -2px) rotate(1deg);
            }

            90% {
                transform: translate(3px, 3px) rotate(0deg);
            }

            100% {
                transform: translate(2px, -3px) rotate(-1deg);
            }
        }

        .shake {
            animation: shake 0.2s linear;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .score-board {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .btn {
            background-color: transparent;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

            .btn:hover {
                background-color: var(--text-color);
                color: var(--bg-color);
            }

        .btn-skip {
            border-color: #555;
            color: #888;
            font-size: 0.85rem;
        }

            .btn-skip:hover {
                border-color: var(--text-color);
                color: var(--text-color);
                background: transparent;
            }

        /* --- MUSIC SITE STYLES --- */
        #music-screen {
            max-width: 800px;
            justify-content: flex-start;
            padding-top: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

            header h2 {
                font-size: 3rem;
                margin-bottom: 10px;
                letter-spacing: 1px;
            }

        .track-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .track-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-left: 5px solid var(--indie-red);
            flex-wrap: wrap;
        }

        .track-info {
            flex: 1;
            min-width: 200px;
        }

        .track-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 0.9rem;
            color: #aaa;
        }

        .audio-player {
            flex: 2;
            min-width: 250px;
        }

        audio {
            width: 100%;
            outline: none;
        }

        .download-btn {
            background-color: var(--indie-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
            text-align: center;
        }

            .download-btn:hover {
                background-color: #ff5588;
            }

        @media (max-width: 600px) {
            .track-card {
                flex-direction: column;
                align-items: stretch;
            }

            .audio-player {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- SECTION 1: LANDING GAME -->
    <section id="game-screen" class="screen">
        <h1>Kill Spotify</h1>
        <p>Destroy the bouncing Spotify logo 3 times to unlock the Music Vault!</p>

        <div id="canvas-container">
            <canvas id="gameCanvas" width="360" height="450"></canvas>
        </div>

        <div class="score-board">
            Hits: <span id="score">0</span> / 3
        </div>

        <button class="btn btn-skip" id="skip-btn">Skip Game & Stream Music</button>
    </section>

    <!-- SECTION 2: MUSIC DOWNLOAD & STREAMING -->
    <section id="music-screen" class="screen hidden">
        <header>
            <h2>The Vault</h2>
            <p>Stream or download exclusive tracks below.</p>
        </header>

        <div class="track-list">
            <div class="track-card">
                <div class="track-info">
                    <div class="track-title">Rebel Waves</div>
                    <div class="track-artist">Your Client Name</div>
                </div>
                <div class="audio-player">
                    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
                </div>
                <a href="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" download class="download-btn">Download MP3</a>
            </div>

            <div class="track-card">
                <div class="track-info">
                    <div class="track-title">Corporate Noise</div>
                    <div class="track-artist">Your Client Name</div>
                </div>
                <div class="audio-player">
                    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
                </div>
                <a href="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" download class="download-btn">Download MP3</a>
            </div>

            <div class="track-card">
                <div class="track-info">
                    <div class="track-title">Indie Resurgence</div>
                    <div class="track-artist">Your Client Name</div>
                </div>
                <div class="audio-player">
                    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
                </div>
                <a href="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" download class="download-btn">Download MP3</a>
            </div>
        </div>

        <button class="btn" style="margin-top: 40px;" onclick="restartGame()">Replay Game</button>
    </section>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameScreen = document.getElementById('game-screen');
        const musicScreen = document.getElementById('music-screen');
        const skipBtn = document.getElementById('skip-btn');
        const canvasContainer = document.getElementById('canvas-container');

        // Load the official transparent Spotify logo
        const spotifyImg = new Image();
        spotifyImg.src = 'https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg';

        let score = 0;
        const targetScore = 3;
        let animationFrameId;
        let isGameOver = false;

        // Freeze-frame / juice mechanics
        let isFrozen = false;
        let isFlashing = false;

        // DVD Bouncing Target Object
        const target = {
            x: 180,
            y: 225,
            radius: 35,
            vx: 3,
            vy: 2.5
        };

        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                // Higher pitch for hit confirmation
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                // Ignore audio restriction context errors
            }
        }

        function initTarget() {
            target.x = canvas.width / 2;
            target.y = canvas.height / 2;
            target.radius = 35;

            // Randomize starting direction
            const angle = Math.random() * Math.PI * 2;
            const speed = 2.5; // Starting speed
            target.vx = Math.cos(angle) * speed;
            target.vy = Math.sin(angle) * speed;
        }

        function updateGame() {
            // Only move target if not frozen in hit stop
            if (!isFrozen) {
                target.x += target.vx;
                target.y += target.vy;

                // DVD Bounce Logic (Left/Right)
                if (target.x - target.radius < 0) {
                    target.x = target.radius;
                    target.vx = -target.vx;
                } else if (target.x + target.radius > canvas.width) {
                    target.x = canvas.width - target.radius;
                    target.vx = -target.vx;
                }

                // DVD Bounce Logic (Top/Bottom)
                if (target.y - target.radius < 0) {
                    target.y = target.radius;
                    target.vy = -target.vy;
                } else if (target.y + target.radius > canvas.height) {
                    target.y = canvas.height - target.radius;
                    target.vy = -target.vy;
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the target
            if (isFlashing) {
                // Draw a solid white circle for a bright flash effect on hit
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                ctx.closePath();
            } else if (spotifyImg.complete) {
                ctx.drawImage(
                    spotifyImg,
                    target.x - target.radius,
                    target.y - target.radius,
                    target.radius * 2,
                    target.radius * 2
                );
            } else {
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1DB954';
                ctx.fill();
                ctx.closePath();
            }

            if (!isGameOver) {
                animationFrameId = requestAnimationFrame(updateGame);
            }
        }

        // Click / Touch Listeners
        canvas.addEventListener('mousedown', handleHit);
        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const clickX = touch.clientX - rect.left;
            const clickY = touch.clientY - rect.top;
            processHit(clickX, clickY);
        });

        function handleHit(e) {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            processHit(clickX, clickY);
        }

        function processHit(clickX, clickY) {
            if (isGameOver || isFrozen) return;

            const dist = Math.hypot(clickX - target.x, clickY - target.y);

            if (dist < target.radius) {
                playPopSound();
                score++;
                scoreEl.textContent = score;

                if (score >= targetScore) {
                    endGame(true);
                } else {
                    isFrozen = true;
                    isFlashing = true;

                    canvasContainer.classList.add('shake');

                    setTimeout(() => {
                        isFrozen = false;
                        isFlashing = false;
                        canvasContainer.classList.remove('shake');
                    }, 200);

                    const currentSpeed = Math.hypot(target.vx, target.vy);
                    const newSpeed = currentSpeed * 1.3;

                    const randomAngle = Math.random() * Math.PI * 2;

                    target.vx = Math.cos(randomAngle) * newSpeed;
                    target.vy = Math.sin(randomAngle) * newSpeed;
                }
            }
        }

        function endGame(won) {
            isGameOver = true;
            cancelAnimationFrame(animationFrameId);

            if (won) {
                isFrozen = true;
                isFlashing = true;
                canvasContainer.classList.add('shake');

                setTimeout(() => {
                    canvasContainer.classList.remove('shake');
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText("SPOTIFY DEFEATED!", canvas.width / 2, canvas.height / 2 - 20);
                    ctx.font = '16px sans-serif';
                    ctx.fillText("Entering the Vault...", canvas.width / 2, canvas.height / 2 + 20);

                    setTimeout(() => {
                        transitionToMusic();
                    }, 1500);
                }, 300);
            }
        }

        function transitionToMusic() {
            // 1. Fade out the game screen smoothly
            gameScreen.classList.add('fade-out');

            // 2. Wait for the fade-out animation to finish (600ms)
            setTimeout(() => {
                gameScreen.classList.add('hidden');

                // Prepare the music screen: make it visible but completely transparent
                musicScreen.classList.add('fade-out');
                musicScreen.classList.remove('hidden');

                // Force a browser reflow so the browser registers the transparent state
                void musicScreen.offsetWidth;

                // Scroll to the top of the page instantly while it is hidden
                window.scrollTo(0, 0);

                // 3. Smoothly fade the music screen in
                musicScreen.classList.remove('fade-out');
            }, 600); // Matches the 0.6s transition in CSS
        }

        function restartGame() {
            // 1. Fade out the music screen smoothly
            musicScreen.classList.add('fade-out');

            // 2. Wait 600ms, reset the game state, and swap the screens
            setTimeout(() => {
                score = 0;
                scoreEl.textContent = score;
                isGameOver = false;
                isFrozen = false;
                isFlashing = false;

                musicScreen.classList.add('hidden');

                // Prepare the game screen to be visible but transparent
                gameScreen.classList.add('fade-out');
                gameScreen.classList.remove('hidden');

                // Force browser reflow
                void gameScreen.offsetWidth;

                // 3. Smoothly fade the game screen back in
                gameScreen.classList.remove('fade-out');

                initGame();
            }, 600);
        }

        function initGame() {
            initTarget();
            updateGame();
        }

        skipBtn.addEventListener('click', transitionToMusic);

        // Start Game
        initGame();
    </script>
</body>
</html>
