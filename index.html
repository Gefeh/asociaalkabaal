<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie Music Vault</title>

    <!-- 1. THE CSS STYLES MUST GO INSIDE THIS STYLE TAG -->
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #1DB954; /* Spotify Green for irony */
            --indie-red: #ff3366;
            --card-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Screen States */
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            transition: opacity 0.5s ease-in-out;
        }

        .hidden {
            display: none !important;
        }

        /* --- LANDING GAME STYLES --- */
        #game-screen {
            text-align: center;
        }

        #game-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--indie-red);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #game-screen p {
            margin-bottom: 20px;
            color: #aaa;
        }

        #canvas-container {
            position: relative;
            border: 3px solid var(--indie-red);
            border-radius: 8px;
            background: #111;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .score-board {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .btn {
            background-color: transparent;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .btn-skip {
            border-color: #555;
            color: #888;
            font-size: 0.85rem;
        }

        .btn-skip:hover {
            border-color: var(--text-color);
            color: var(--text-color);
            background: transparent;
        }

        /* --- MUSIC SITE STYLES --- */
        #music-screen {
            max-width: 800px;
            justify-content: flex-start;
            padding-top: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h2 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .track-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .track-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-left: 5px solid var(--indie-red);
            flex-wrap: wrap;
        }

        .track-info {
            flex: 1;
            min-width: 200px;
        }

        .track-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 0.9rem;
            color: #aaa;
        }

        .audio-player {
            flex: 2;
            min-width: 250px;
        }

        audio {
            width: 100%;
            outline: none;
        }

        .download-btn {
            background-color: var(--indie-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
            text-align: center;
        }

        .download-btn:hover {
            background-color: #ff5588;
        }

        @media (max-width: 600px) {
            .track-card {
                flex-direction: column;
                align-items: stretch;
            }
            .audio-player {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- 2. THE HTML CONTENT (Sits between the head and the script) -->
    <section id="game-screen" class="screen">
        <h1>Kill Spotify</h1>
        <p>Click/Tap the falling Spotify logos to unlock the Music Vault!</p>
        
        <div id="canvas-container">
            <canvas id="gameCanvas" width="400" height="450"></canvas>
        </div>

        <div class="score-board">
            Score: <span id="score">0</span> / 10
        </div>

        <button class="btn btn-skip" id="skip-btn">Skip Game & Stream Music</button>
    </section>

    <section id="music-screen" class="screen hidden">
        <header>
            <h2>The Vault</h2>
            <p>Stream or download exclusive tracks below.</p>
        </header>

        <div class="track-list">
            <div class="track-card">
                <div class="track-info">
                    <div class="track-title">Rebel Waves</div>
                    <div class="track-artist">Your Client Name</div>
                </div>
                <div class="audio-player">
                    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
                </div>
                <a href="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" download class="download-btn">Download MP3</a>
            </div>

            <div class="track-card">
                <div class="track-info">
                    <div class="track-title">Corporate Noise</div>
                    <div class="track-artist">Your Client Name</div>
                </div>
                <div class="audio-player">
                    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
                </div>
                <a href="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" download class="download-btn">Download MP3</a>
            </div>

            <div class="track-card">
                <div class="track-info">
                    <div class="track-title">Indie Resurgence</div>
                    <div class="track-artist">Your Client Name</div>
                </div>
                <div class="audio-player">
                    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
                </div>
                <a href="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" download class="download-btn">Download MP3</a>
            </div>
        </div>

        <button class="btn" style="margin-top: 40px;" onclick="restartGame()">Replay Game</button>
    </section>

    <!-- 3. THE JAVASCRIPT CODE MUST GO INSIDE THIS SCRIPT TAG -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameScreen = document.getElementById('game-screen');
        const musicScreen = document.getElementById('music-screen');
        const skipBtn = document.getElementById('skip-btn');

        let score = 0;
        const targetScore = 10;
        let targets = [];
        let spawnInterval;
        let animationFrameId;
        let isGameOver = false;

        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                // Ignore audio block
            }
        }

        class SpotifyTarget {
            constructor() {
                this.radius = Math.random() * 15 + 20;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 2 + 1.5;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1DB954';
                ctx.fill();
                ctx.closePath();

                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';

                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    const offset = i * 4;
                    ctx.arc(
                        this.x, 
                        this.y + (this.radius * 0.1) + offset, 
                        this.radius * (0.45 + i * 0.15), 
                        Math.PI * 1.25, 
                        Math.PI * 1.75
                    );
                    ctx.stroke();
                    ctx.closePath();
                }
            }
        }

        function spawnTarget() {
            if (isGameOver) return;
            targets.push(new SpotifyTarget());
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnTarget, Math.random() * 800 + 600);
        }

        function updateGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            targets = targets.filter(t => t.y - t.radius < canvas.height);

            targets.forEach(t => {
                t.update();
                t.draw();
            });

            if (!isGameOver) {
                animationFrameId = requestAnimationFrame(updateGame);
            }
        }

        canvas.addEventListener('mousedown', handleHit);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const clickX = touch.clientX - rect.left;
            const clickY = touch.clientY - rect.top;
            processHit(clickX, clickY);
        });

        function handleHit(e) {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            processHit(clickX, clickY);
        }

        function processHit(clickX, clickY) {
            if (isGameOver) return;

            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dist = Math.hypot(clickX - t.x, clickY - t.y);
                
                if (dist < t.radius) {
                    playPopSound();
                    targets.splice(i, 1);
                    score++;
                    scoreEl.textContent = score;

                    if (score >= targetScore) {
                        endGame(true);
                    }
                    break;
                }
            }
        }

        function endGame(won) {
            isGameOver = true;
            cancelAnimationFrame(animationFrameId);
            clearInterval(spawnInterval);

            if (won) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText("SPOTIFY DEFEATED!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '16px sans-serif';
                ctx.fillText("Entering the Vault...", canvas.width / 2, canvas.height / 2 + 20);

                setTimeout(() => {
                    transitionToMusic();
                }, 1500);
            }
        }

        function transitionToMusic() {
            gameScreen.classList.add('hidden');
            musicScreen.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartGame() {
            score = 0;
            scoreEl.textContent = score;
            isGameOver = false;
            targets = [];
            musicScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            initGame();
        }

        function initGame() {
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnTarget, 1000);
            updateGame();
        }

        skipBtn.addEventListener('click', transitionToMusic);

        initGame();
    </script>
</body>
</html>
