<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociaal Kabaal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav id="nav-header" class="hidden">
        <button id="tab-game" class="tab-btn" onclick="switchTab('game')">Kill Spotify</button>
        <button id="tab-music" class="tab-btn" onclick="switchTab('music')">Our Music</button>
    </nav>

    <!-- Kill Spotify -->
    <section id="game-screen" class="screen">
        <h1>Kill Spotify</h1>
        <p>Tap/Click the bouncing logo to kill Spotify!</p>

        <div id="canvas-container">
            <canvas id="gameCanvas" width="360" height="450"></canvas>
        </div>

        <button class="btn btn-skip" id="skip-btn">Skip Game & Stream Music</button>
    </section>

    <!-- Music -->
    <!-- SECTION 2: MUSIC DOWNLOAD & STREAMING (Spotify Redesign) -->
    <section id="music-screen" class="screen hidden">
        <header>
            <h2>Asociaal Kabaal</h2>
            <p>Stream or download exclusive tracks below.</p>
        </header>

        <!-- Search and Sort controls -->
        <div class="search-sort-container">
            <input type="text" id="search-bar" placeholder="Search by song or EP..." oninput="handleSearch()">

            <div class="sort-wrapper">
                <label for="sort-select">Sort by:</label>
                <select id="sort-select" onchange="handleSort()">
                    <option value="date-desc">Release Date (Newest)</option>
                    <option value="date-asc">Release Date (Oldest)</option>
                    <option value="title-asc">Title (A-Z)</option>
                    <option value="duration-desc">Duration (Longest)</option>
                </select>
            </div>
        </div>

        <!-- The dynamically rendered tracklist -->
        <div class="track-list" id="tracklist-container">
            <!-- JavaScript will render the Spotify-like rows here -->
        </div>
    </section>

    <!-- MASTER PLAYER BAR (Fixed at bottom of viewport, always visible after unlock) -->
    <div id="master-player" class="hidden">
        <div class="player-left">
            <img id="player-cover" src="https://via.placeholder.com/56" alt="Album Art">
            <div class="player-track-info">
                <div id="player-title" class="truncate">Select a song</div>
                <div id="player-artist" class="truncate"></div>
            </div>
        </div>

        <div class="player-middle">
            <div class="player-controls">
                <button class="control-btn" onclick="prevTrack()">⏮</button>
                <button class="control-btn play-btn" id="master-play-btn" onclick="togglePlay()">▶</button>
                <button class="control-btn" onclick="nextTrack()">⏭</button>
            </div>
            <div class="progress-bar-container">
                <span id="progress-current">0:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0" oninput="seekAudio()">
                <span id="progress-total">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <div class="volume-container">
                <span id="volume-icon" onclick="toggleMute()" style="cursor: pointer;">🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="80" oninput="setVolume()">
            </div>
            <a id="player-download-mp3" href="#" download class="player-download-btn">MP3</a>
            <a id="player-download-wav" href="#" download class="player-download-btn secondary">WAV</a>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="music.js"></script>
</body>
</html>
